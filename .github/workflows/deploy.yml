name: Déploiement .NET sur Synology NAS

on:
  push:
    branches:
      - master # Déclenchement sur push sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du dépôt
      - name: Checkout du code
        uses: actions/checkout@v3

      # 2. Installer le SDK .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0" # Adaptez selon votre version .NET

      # 3. Restaurer les dépendances
      - name: Restauration des dépendances
        run: dotnet restore

      # 4. Compiler l'application
      - name: Build de l'application
        run: dotnet build --configuration Release --no-restore

      # 5. Publier l'application en mode self-contained pour linux-x64
      - name: Publication de l'application
        run: dotnet publish -c Release -r linux-x64 --self-contained true -o published --no-build

      # 6. Copier les fichiers publiés sur le NAS via SCP
      - name: Copier les fichiers sur le Synology NAS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "published/"
          target: ${{ secrets.TARGET_PATH }}

      # 7. Exécuter les commandes de déploiement sur le NAS via SSH
      - name: Déployer l'application sur le NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Donner les permissions d'exécution au binaire
            chmod +x ${{ secrets.TARGET_PATH }}Angular_Api
            # Arrêter l'ancienne instance de l'application (s'il y en a une)
            pkill -f Angular_Api || true
            # Lancer l'application en arrière-plan et rediriger la sortie vers un log
            nohup ${{ secrets.TARGET_PATH }}Angular_Api > ${{ secrets.TARGET_PATH }}app.log 2>&1 &
